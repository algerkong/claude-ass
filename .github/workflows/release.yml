name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Package extension
        run: |
          mkdir -p release
          zip -r "release/claude-loading-art-${GITHUB_REF_NAME}.zip" \
            manifest.json \
            dist/ \
            icons/ \
            src/popup.html \
            src/popup.css

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
